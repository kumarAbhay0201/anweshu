<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Final Level: Shershaah Mode vs Gundi-Dadi</title>
    <style>
        :root {
            --bg-dark: #050202;
            --neon-blue: #00f0ff;
            --neon-pink: #ff007f;
            --neon-green: #33ff99;
            --neon-red: #ff2233;
            --neon-gold: #ffcc00;
            --neon-orange: #ff6600;
            --text-white: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; background: var(--bg-dark); color: var(--text-white); font-family: 'Courier New', monospace; font-weight: bold; overflow: hidden; }

        /* Retro Arcade Scanlines */
        body::before {
            content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
            z-index: 999; background-size: 100% 4px; pointer-events: none;
        }

        #gameContainer { position: relative; width: 100vw; height: 100vh; }
        canvas { display: block; width: 100%; height: 100%; }

        /* HUD layout grid overlay */
        #hudContainer {
            position: absolute; top: 20px; left: 0; width: 100%; padding: 0 40px;
            display: flex; justify-content: space-between; align-items: center; z-index: 5; pointer-events: none;
        }
        .hud-group { display: flex; gap: 25px; align-items: center; }
        .hud-metric { display: flex; flex-direction: column; gap: 5px; }
        .hud-label { font-size: 0.9rem; letter-spacing: 1px; text-transform: uppercase; }
        .bar-container { width: 200px; height: 14px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3); border-radius: 3px; overflow: hidden; }
        .progress-bar { height: 100%; width: 100%; transition: width 0.1s linear; }
        #agentHpBar { background: var(--neon-green); box-shadow: 0 0 8px var(--neon-green); }
        #shieldBar { background: var(--neon-blue); box-shadow: 0 0 8px var(--neon-blue); }
        #enemyHpBar { background: var(--neon-red); box-shadow: 0 0 8px var(--neon-red); }

        /* Game State Graphic Overlays */
        #systemAlertBanner {
            position: absolute; top: 120px; left: 50%; transform: translateX(-50%);
            font-size: 2.2rem; color: var(--neon-red); text-shadow: 0 0 20px var(--neon-red);
            letter-spacing: 2px; display: none; text-align: center; z-index: 4; width: 80%;
        }

        /* 10-Second Countdown Overlay Box */
        #countdownOverlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 2, 2, 0.94); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10;
        }
        #countdownTimer { font-size: 7rem; color: var(--neon-pink); text-shadow: 0 0 25px var(--neon-pink); margin-bottom: 2rem; }
        .guide-box { border: 2px dashed #ff3300; background: rgba(255, 51, 0, 0.04); padding: 1.5rem 2.5rem; border-radius: 12px; text-align: center; max-width: 600px; }
        .story-alert { font-size: 1.4rem; color: var(--neon-gold); margin-bottom: 1rem; text-shadow: 0 0 10px rgba(255,204,0,0.4); }

        /* Styled Medium-Sized Rectangular Video Frame Container (Yellow Fire Border) */
        .video-frame-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8); display: none; justify-content: center; align-items: center; z-index: 50;
        }
        
        .video-wrapper {
            width: 70%;
            max-width: 760px;
            aspect-ratio: 16/9;
            background: #000;
            border: 5px solid var(--neon-orange);
            box-shadow: 0 0 25px var(--neon-gold), inset 0 0 15px rgba(255, 102, 0, 0.5);
            border-radius: 12px;
            overflow: hidden;
        }
        
        video { width: 100%; height: 100%; object-fit: cover; }

        /* Dynamic Flash Buttons */
        .flash-help-btn {
            position: absolute; top: 55%; left: 50%; transform: translate(-50%, -50%);
            padding: 20px 45px; font-size: 1.8rem; font-weight: bold; font-family: inherit;
            color: #000; background-color: #ffaa00; border: 4px solid #fff; border-radius: 12px;
            cursor: pointer; display: none; z-index: 30; letter-spacing: 2px;
            box-shadow: 0 0 30px #ffaa00; animation: helpPulse 0.5s infinite alternate;
        }
        @keyframes helpPulse {
            0% { transform: translate(-50%, -50%) scale(1); box-shadow: 0 0 15px #ffaa00; }
            100% { transform: translate(-50%, -50%) scale(1.08); box-shadow: 0 0 35px #ffaa00; }
        }

        /* Final Victory Card Grid */
        #scorecardOverlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(7, 2, 2, 0.96); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 100;
        }
        .score-box { border: 4px solid var(--neon-green); background: rgba(255, 255, 255, 0.02); padding: 3rem; border-radius: 16px; text-align: center; box-shadow: 0 0 30px rgba(51,255,153,0.3); }
        .score-box h2 { font-size: 3rem; color: var(--neon-green); text-shadow: 0 0 20px var(--neon-green); margin-bottom: 1.5rem; }
    </style>
</head>
<body>

    <div id="gameContainer">
        <div id="hudContainer">
            <div class="hud-group">
                <div class="hud-metric">
                    <span class="hud-label" style="color: var(--neon-green)">AGENT HP</span>
                    <div class="bar-container"><div id="agentHpBar" class="progress-bar"></div></div>
                </div>
                <div class="hud-metric">
                    <span class="hud-label" style="color: var(--neon-blue)">SHIELD CAP</span>
                    <div class="bar-container"><div id="shieldBar" class="progress-bar"></div></div>
                </div>
                <div class="hud-metric">
                    <span class="hud-label" style="color: #ffffff">AMMO</span>
                    <div id="ammoDisplay" class="ammo-counter">30/30</div>
                </div>
            </div>
            <div class="hud-group">
                <div class="hud-metric" style="align-items: flex-end;">
                    <span id="enemyLabel" class="hud-label" style="color: var(--neon-red)">BOSS: GUNDI-DADI</span>
                    <div class="bar-container" style="width: 250px;"><div id="enemyHpBar" class="progress-bar"></div></div>
                </div>
            </div>
        </div>

        <div id="systemAlertBanner">BOSS ENERGY FIELD IS DRAINING YOUR HEALTH!</div>
        <button id="helpButton" class="flash-help-btn" onclick="triggerMotivationVideo()">CLICK TO GET HELP! 🚨</button>

        <div id="countdownOverlay">
            <div id="countdownTimer">10</div>
            <div class="guide-box">
                <div class="story-alert">⚡ FINAL SHOWDOWN: here is the encounter with kidnapper number 3 and 2. ⚡</div>
                <p style="color:#aaa; letter-spacing:1px;">Gundi-Dadi is 2X stronger and larger. Prepare yourself.</p>
            </div>
        </div>

        <div id="motivationVideoOverlay" class="video-frame-overlay">
            <div class="video-wrapper">
                <video id="motivationVideo" src="https://res.cloudinary.com/dgpzqicfa/video/upload/Shershaah-mode_kf8kgf.mp4" controls></video>
            </div>
        </div>
        <div id="celebrationVideoOverlay" class="video-frame-overlay">
            <div class="video-wrapper">
                <video id="celebrationVideo" src="https://res.cloudinary.com/dgpzqicfa/video/upload/ye-dil-mange-more_dcgbmg.mp4" controls></video>
            </div>
        </div>

        <div id="scorecardOverlay">
            <div class="score-box">
                <h2>VICTORY COMPLETE</h2>
                <p style="font-size:1.3rem; letter-spacing:1px;">Mission "Crying Baby" Successfully Accomplished!</p>
            </div>
        </div>

        <canvas id="gameCanvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // DOM Nodes
        const agentHpBar = document.getElementById('agentHpBar');
        const shieldBar = document.getElementById('shieldBar');
        const ammoDisplay = document.getElementById('ammoDisplay');
        const enemyHpBar = document.getElementById('enemyHpBar');
        const systemAlertBanner = document.getElementById('systemAlertBanner');
        const helpButton = document.getElementById('helpButton');
        const countdownOverlay = document.getElementById('countdownOverlay');
        const countdownTimer = document.getElementById('countdownTimer');
        
        const motivationVideoOverlay = document.getElementById('motivationVideoOverlay');
        const motivationVideo = document.getElementById('motivationVideo');
        const celebrationVideoOverlay = document.getElementById('celebrationVideoOverlay');
        const celebrationVideo = document.getElementById('celebrationVideo');
        const scorecardOverlay = document.getElementById('scorecardOverlay');

        // Core scenario ground calculation function
        const getGroundY = () => canvas.height - 120;

        // Player config definition
        const player = {
            x: 250, y: 0, width: 44, height: 78, vy: 0, gravity: 0.65, isJumping: false,
            hp: 100, shieldHp: 100, shieldActive: false, ammo: 30,
            militaryUpgraded: false, autopilotMode: false
        };

        // 2X Size Giant Boss Gundi-Dadi Config
        const boss = {
            x: 0, y: 0, width: 100, height: 170, hp: 500, maxHp: 500,
            active: true, attackCooldown: 0, deathVfxTriggered: false
        };

        function resizeCanvas() { 
            canvas.width = window.innerWidth; 
            canvas.height = window.innerHeight; 
            
            if (!player.isJumping) {
                player.y = getGroundY() - player.height;
            }
            boss.x = canvas.width - 300; 
            boss.y = getGroundY() - boss.height;
        }
        window.addEventListener('resize', resizeCanvas);

        // Audio Assets Configuration
        const bgMusic = new Audio('game-background.mp3'); bgMusic.loop = true;
        const sirenSound = new Audio('siren.mp3'); sirenSound.loop = true;
        const powerupSound = new Audio('powerup-sound.mp3');
        const ak47Sound = new Audio('ak47-sound.mp3'); ak47Sound.loop = true;
        const victoryMusic = new Audio('victory-music.mp3'); victoryMusic.loop = true;

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        /* --- SYNTHETIC ARCADE PROCEDURAL EXPLOSION SOUND --- */
        function playExplosionSound() {
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(120, now);
            osc.frequency.linearRampToValueAtTime(10, now + 1.2);
            gain.gain.setValueAtTime(0.4, now);
            gain.gain.exponentialRampToValueAtTime(0.0001, now + 1.2);
            
            osc.start(now); osc.stop(now + 1.2);
        }

        function playCodedBeep(type) {
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;
            if (type === 'jump') {
                osc.type = 'triangle'; osc.frequency.setValueAtTime(160, now); osc.frequency.exponentialRampToValueAtTime(650, now + 0.14);
                gain.gain.setValueAtTime(0.2, now); gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.14);
                osc.start(now); osc.stop(now + 0.14);
            } else if (type === 'fire') {
                osc.type = 'square'; osc.frequency.setValueAtTime(750, now); osc.frequency.linearRampToValueAtTime(150, now + 0.08);
                gain.gain.setValueAtTime(0.12, now); gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.08);
                osc.start(now); osc.stop(now + 0.08);
            } else if (type === 'thunder') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(300, now); osc.frequency.linearRampToValueAtTime(80, now + 0.3);
                gain.gain.setValueAtTime(0.2, now); gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.3);
                osc.start(now); osc.stop(now + 0.3);
            }
        }

        // Countdown control sequence
        let introTimerValue = 10;
        let isGameRunning = false;

        window.addEventListener('DOMContentLoaded', () => { 
            resizeCanvas(); 
            bgMusic.play().catch(() => {}); 
        });
        window.addEventListener('keydown', function wakeContext() { if(bgMusic.paused) bgMusic.play(); window.removeEventListener('keydown', wakeContext); });

        const countdownLoop = setInterval(() => {
            introTimerValue--;
            countdownTimer.innerText = introTimerValue;
            if (introTimerValue <= 0) {
                clearInterval(countdownLoop);
                countdownOverlay.style.display = 'none';
                isGameRunning = true;
                gameLoop();
            }
        }, 1000);

        // Tracking Systems Arrays
        const playerBullets = [];
        const bossThunderstrikes = [];
        const auraFireParticles = [];
        const bloodExplosionParticles = [];
        const endgameCrackerParticles = [];

        let globalMatchTime = 0;
        let starfieldOffset = 0;
        let emergencyHelpTriggered = false;

        function emitFireAura() {
            auraFireParticles.push({
                x: player.x + Math.random() * player.width, y: player.y + player.height,
                vx: Math.random() * 1 - 0.5, vy: Math.random() * -4 - 2,
                size: Math.random() * 15 + 5, hue: Math.random() * 20 + 15, alpha: 1
            });
        }

        function emitBloodSplatter(x, y) {
            for (let i = 0; i < 15; i++) {
                bloodExplosionParticles.push({
                    x: x, y: y, vx: Math.random() * 4 - 2, vy: Math.random() * -4 - 1, radius: Math.random() * 3 + 1, alpha: 1
                });
            }
        }

        function emitVictoryCracker() {
            const colors = ['#ff0055', '#00f0ff', '#ffcc00', '#33ff99', '#ff00ff'];
            const targetColor = colors[Math.floor(Math.random() * colors.length)];
            const spawnX = Math.random() * canvas.width;
            const spawnY = Math.random() * (canvas.height * 0.6);
            for(let i=0; i<40; i++) {
                endgameCrackerParticles.push({
                    x: spawnX, y: spawnY,
                    vx: Math.cos(i) * (Math.random() * 6 + 2), vy: Math.sin(i) * (Math.random() * 6 + 2),
                    color: targetColor, alpha: 1, size: Math.random() * 4 + 2
                });
            }
        }

        const inputStateKeys = {};
        window.addEventListener('keydown', (e) => {
            inputStateKeys[e.key.toLowerCase()] = true;
            if (!isGameRunning || player.autopilotMode) return;

            if (e.key === " " || e.key === "Spacebar") {
                if (!player.isJumping) {
                    player.vy = -14.5; player.isJumping = true;
                    playCodedBeep('jump');
                }
            }
            if (e.key.toLowerCase() === 'f' && player.ammo > 0) {
                player.ammo--;
                playerBullets.push({ x: player.x + player.width, y: player.y + 28, speed: 14 });
                playCodedBeep('fire');
            }
        });
        window.addEventListener('keyup', (e) => { inputStateKeys[e.key.toLowerCase()] = false; });

        function checkOverlap(rect1, rect2) {
            return rect1.x < rect2.x + rect2.width && rect1.x + rect1.width > rect2.x &&
                   rect1.y < rect2.y + rect2.height && rect1.y + rect1.height > rect2.y;
        }

        /* --- PRIMARY MASTER GAME RUN LOOP --- */
        function gameLoop() {
            if (!isGameRunning) return;
            updateEngineState();
            renderEngineGraphics();
            requestAnimationFrame(gameLoop);
        }

        function updateEngineState() {
            const currentFloorLevel = getGroundY();

            // Refresh Progress bars
            agentHpBar.style.width = `${Math.max(0, player.hp)}%`;
            shieldBar.style.width = `${Math.max(0, player.shieldHp)}%`;
            enemyHpBar.style.width = `${(Math.max(0, boss.hp) / boss.maxHp) * 100}%`;
            ammoDisplay.innerText = player.militaryUpgraded ? "∞/∞" : `${player.ammo}/30`;

            if (!player.shieldActive && player.shieldHp < 100) player.shieldHp += 0.05;

            starfieldOffset -= 1.5;
            if (starfieldOffset <= -canvas.width) starfieldOffset = 0;

            if (!player.autopilotMode) {
                if (inputStateKeys['s'] && player.shieldHp > 0) {
                    if (!player.shieldActive) playCodedBeep('shield');
                    player.shieldActive = true;
                } else { player.shieldActive = false; }
            }

            player.vy += player.gravity; player.y += player.vy;
            if (player.y > currentFloorLevel - player.height) {
                player.y = currentFloorLevel - player.height; player.vy = 0; player.isJumping = false;
            }

            // Time Tracking & Damage Management
            if (!player.militaryUpgraded) {
                globalMatchTime += (1 / 60);

                if (globalMatchTime >= 30) {
                    systemAlertBanner.style.display = 'block';
                    player.hp -= 0.35; 
                }

                // Help button displays precisely when player health slides into the [20 - 0] range
                if (player.hp <= 20 && player.hp > 0 && !emergencyHelpTriggered) {
                    emergencyHelpTriggered = true;
                    isGameRunning = false; 
                    bgMusic.pause();
                    
                    sirenSound.currentTime = 0;
                    sirenSound.play().catch(() => {}); 
                    
                    helpButton.style.display = 'block'; 
                    return;
                }
            }

            // Handle Military Autopilot Automation Output Sequence Actions
            if (player.autopilotMode && boss.active) {
                emitFireAura(); 
                
                if (!player.isJumping && Math.random() < 0.015) {
                    player.vy = -14.5; player.isJumping = true; playCodedBeep('jump');
                }

                // Automated hyper weapon emission rate
                if (Math.random() < 0.25) {
                    playerBullets.push({ x: player.x + player.width, y: player.y + 25, speed: 22, poweredUp: true });
                }
            }

            // Process Player Attack Vectors
            for (let i = playerBullets.length - 1; i >= 0; i--) {
                playerBullets[i].x += playerBullets[i].speed;
                let b = playerBullets[i];

                if (boss.active && b.x > boss.x && b.x < boss.x + boss.width && b.y > boss.y && b.y < boss.y + boss.height) {
                    boss.hp -= b.poweredUp ? 3.5 : 6;
                    playerBullets.splice(i, 1);

                    if (boss.hp <= 0 && boss.active) {
                        boss.hp = 0; boss.active = false;
                        handleBossCasualtySequence();
                    }
                    continue;
                }
                if (b.x > canvas.width) playerBullets.splice(i, 1);
            }

            // Process Giant Gundi-Dadi Hostile Attacks
            if (boss.active) {
                boss.attackCooldown++;
                let targetedRate = player.autopilotMode ? 25 : 45;
                if (boss.attackCooldown > targetedRate) {
                    // Calculate vector from boss to player for accurate aim
                    let agentMidpointY = player.y + (player.height / 2);
                    let bossLauncherY = boss.y + 50;
                    let bossLauncherX = boss.x - 20;
                    let targetX = player.x + player.width / 2;
                    let targetY = agentMidpointY;
                    let dx = targetX - bossLauncherX;
                    let dy = targetY - bossLauncherY;
                    let speed = 11;
                    let distance = Math.sqrt(dx * dx + dy * dy) || 1;
                    let speedX = speed * (dx / distance);
                    let speedY = speed * (dy / distance);

                    bossThunderstrikes.push({
                        x: bossLauncherX,
                        y: bossLauncherY,
                        speedX: speedX,
                        speedY: speedY
                    });
                    playCodedBeep('thunder');
                    boss.attackCooldown = 0;
                }
            }

            // Process Hostile Thunderstrike Obstacles
            for (let i = bossThunderstrikes.length - 1; i >= 0; i--) {
                let ts = bossThunderstrikes[i];
                ts.x += ts.speedX; ts.y += ts.speedY; 

                let tBox = { x: ts.x, y: ts.y, width: 35, height: 12 };
                let pBox = { x: player.x, y: player.y, width: player.width, height: player.height };

                if (checkOverlap(tBox, pBox)) {
                    if (player.shieldActive) {
                        player.shieldHp -= 30;
                    } else if (!player.autopilotMode) {
                        player.hp -= 15; 
                        emitBloodSplatter(player.x + player.width/2, player.y - 10);
                    }
                    bossThunderstrikes.splice(i, 1);
                    continue;
                }
                if (ts.x < 0 || ts.y > canvas.height || ts.y < 0) bossThunderstrikes.splice(i, 1);
            }

            // Clean particle arrays updates
            for (let i = auraFireParticles.length - 1; i >= 0; i--) {
                let p = auraFireParticles[i]; p.x += p.vx; p.y += p.vy; p.alpha -= 0.02;
                if (p.alpha <= 0) auraFireParticles.splice(i, 1);
            }
            for (let i = bloodExplosionParticles.length - 1; i >= 0; i--) {
                let bp = bloodExplosionParticles[i]; bp.x += bp.vx; bp.y += bp.vy; bp.vy += 0.2; bp.alpha -= 0.02;
                if (bp.alpha <= 0) bloodExplosionParticles.splice(i, 1);
            }
        }

        /* --- VIDEO INTERACTION OVERLAYS & PROGRESSION UPGRADE ENGINES --- */
        function triggerMotivationVideo() {
            helpButton.style.display = 'none';
            systemAlertBanner.style.display = 'none';
            sirenSound.pause(); 
            
            motivationVideoOverlay.style.display = 'flex';
            motivationVideo.play();

            motivationVideo.onended = () => {
                motivationVideoOverlay.style.display = 'none';
                initiateMilitaryTransformation();
            };
        }

        function initiateMilitaryTransformation() {
            powerupSound.play().catch(() => {});
            ak47Sound.play().catch(() => {});

            player.militaryUpgraded = true;
            player.autopilotMode = true; 
            player.hp = 100; 
            player.shieldHp = 100;
            player.shieldActive = false;

            isGameRunning = true;
            gameLoop();
        }

        function handleBossCasualtySequence() {
            ak47Sound.pause(); 
            playExplosionSound(); 

            for (let i = 0; i < 60; i++) {
                emitBloodSplatter(boss.x + boss.width/2 + (Math.random()*60-30), boss.y + boss.height/2 + (Math.random()*100-50));
            }

            setTimeout(() => {
                isGameRunning = false;
                celebrationVideoOverlay.style.display = 'flex';
                celebrationVideo.volume = 1.0; // Set max volume
                celebrationVideo.play();

                const crackerInterval = setInterval(() => { 
                    emitVictoryCracker(); 
                }, 250);

                celebrationVideo.onended = () => {
                    clearInterval(crackerInterval);
                    scorecardOverlay.style.display = 'flex';
                    victoryMusic.play().catch(() => {}); // Play after video ends
                    // Auto-redirect to credit.html after 10 seconds
                    setTimeout(() => {
                        window.location.href = 'credit.html';
                    }, 10000);
                };

            }, 2000);
        }

        function renderEngineGraphics() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const currentFloorLevel = getGroundY();

            ctx.fillStyle = '#050207'; ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = 'rgba(20, 10, 30, 0.4)';
            for (let i = 0; i < 8; i++) {
                ctx.fillRect(starfieldOffset + (i * 380), currentFloorLevel - 280, 180, 280);
            }

            ctx.save(); ctx.globalCompositeOperation = 'screen';
            auraFireParticles.forEach(p => {
                ctx.fillStyle = `hsla(${p.hue}, 100%, 50%, ${p.alpha})`;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
            });
            ctx.restore();

            ctx.fillStyle = '#140808'; ctx.fillRect(0, currentFloorLevel, canvas.width, canvas.height - currentFloorLevel);
            ctx.fillStyle = player.militaryUpgraded ? 'var(--neon-green)' : 'var(--neon-pink)';
            ctx.fillRect(0, currentFloorLevel, canvas.width, 5);

            // --- DRAW ACTIVE AGENT CHARACTER ---
            ctx.save();
            ctx.translate(player.x, player.y);

            if (player.militaryUpgraded) {
                ctx.fillStyle = '#ffdbac'; ctx.fillRect(11, 10, 22, 22);
                ctx.fillStyle = '#3B5323'; ctx.fillRect(8, 0, 28, 14); 
                ctx.fillStyle = '#233314'; ctx.fillRect(6, 12, 32, 4);  
                ctx.fillStyle = '#4B5320'; ctx.fillRect(4, 32, 36, 26);
                ctx.fillStyle = '#2d3310'; ctx.fillRect(8, 38, 10, 6); ctx.fillRect(22, 48, 12, 6);
                ctx.fillStyle = '#4B5320'; ctx.fillRect(4, 58, 13, 20); ctx.fillRect(27, 58, 13, 20);

                ctx.fillStyle = '#5C4033'; ctx.fillRect(28, 40, 25, 7);
                ctx.fillStyle = '#222222'; ctx.fillRect(40, 38, 28, 4); ctx.fillRect(48, 44, 5, 8); 
            } else {
                ctx.fillStyle = '#ffdbac'; ctx.fillRect(11, 0, 22, 22);
                ctx.fillStyle = '#ff66b2'; ctx.fillRect(4, 22, 36, 28);
                ctx.fillStyle = '#4B5320'; ctx.fillRect(4, 50, 14, 28); ctx.fillRect(26, 50, 14, 28);
                ctx.fillStyle = '#1B4D3E'; ctx.fillRect(6, 56, 8, 6); ctx.fillRect(28, 64, 8, 6);
                
                if (player.shieldActive) {
                    ctx.strokeStyle = '#00f0ff'; ctx.lineWidth = 4; ctx.beginPath();
                    ctx.arc(22, 38, 52, 0, Math.PI * 2); ctx.stroke();
                    ctx.fillStyle = 'rgba(0, 240, 255, 0.12)'; ctx.fill();
                }
            }
            ctx.restore();

            // --- DRAW GUNDI-DADI ---
            if (boss.active) {
                ctx.save();
                ctx.translate(boss.x, boss.y);

                ctx.fillStyle = '#e0cda9'; ctx.fillRect(32, 0, 40, 40);
                ctx.fillStyle = '#ffffff'; ctx.fillRect(40, 14, 8, 8); ctx.fillRect(58, 14, 8, 8);
                ctx.fillStyle = '#ff0000'; ctx.fillRect(44, 18, 4, 4); ctx.fillRect(60, 18, 4, 4);

                ctx.fillStyle = '#ff2233'; ctx.fillRect(10, 40, 80, 130);
                ctx.fillStyle = '#880011'; ctx.fillRect(10, 40, 24, 130); ctx.fillRect(34, 55, 45, 24);

                ctx.restore();
            }

            // Draw Weapons
            ctx.fillStyle = player.militaryUpgraded ? '#ffcc00' : '#33ff99';
            playerBullets.forEach(b => ctx.fillRect(b.x, b.y, b.poweredUp ? 24 : 16, 5));

            ctx.lineWidth = 3; ctx.strokeStyle = '#ffffff';
            bossThunderstrikes.forEach(ts => {
                ctx.beginPath(); ctx.moveTo(ts.x, ts.y);
                // Draws dynamic zig-zag lightning graphics targeting the vector lines perfectly
                ctx.lineTo(ts.x + 10, ts.y - 6); 
                ctx.lineTo(ts.x + 20, ts.y + 8); 
                ctx.lineTo(ts.x + 35, ts.y);
                ctx.stroke();
                ctx.strokeStyle = 'rgba(0,240,255,0.4)'; ctx.stroke();
            });

            // Particles Rendering
            ctx.save();
            bloodExplosionParticles.forEach(bp => {
                ctx.fillStyle = `rgba(230, 20, 50, ${bp.alpha})`;
                ctx.beginPath(); ctx.arc(bp.x, bp.y, bp.radius, 0, Math.PI * 2); ctx.fill();
            });
            
            endgameCrackerParticles.forEach(cp => {
                ctx.fillStyle = cp.color; ctx.globalAlpha = cp.alpha;
                ctx.fillRect(cp.x, cp.y, cp.size, cp.size);
                cp.x += cp.vx; cp.y += cp.vy; cp.vy += 0.04; cp.alpha -= 0.015;
            });
            ctx.restore();
        }
    </script>
</body>
</html>
