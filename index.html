<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waiting Days! ✨</title>
    <style>
        /* Cute & Minimal Light Theme styling */
        :root {
            --bg-color: #FFF5F5;
            --card-bg: #FFFFFF;
            --text-main: #654E4E;
            --accent-pink: #FFB7B2;
            --accent-yellow: #FFDAC1;
            --accent-mint: #E2F0CB;
            --text-muted: #A39393;
            --celebrate-pink: #FF8B94;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            text-align: center;
        }

        .container {
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 24px;
            box-shadow: 0 8px 24px rgba(255, 183, 178, 0.2);
            max-width: 480px;
            width: 90%;
            border: 3px solid #FFF0F0;
            position: relative;
            z-index: 10;
            transition: transform 0.3s ease;
        }

        .container:hover {
            transform: scale(1.02);
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            color: var(--celebrate-pink);
        }

        p.subtitle {
            font-size: 0.95rem;
            color: var(--text-muted);
            margin-bottom: 2rem;
        }

        /* Countdown Grid */
                /* Birthday Celebration Header Alignment Fix */
                .celebrate-heading {
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    gap: 8px;
                    font-size: 2.2rem;
                    color: var(--celebrate-pink);
                    margin-bottom: 1.5rem;
                    animation: pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
                }

                /* Play Button Styling */
                .play-btn {
                    background-color: var(--celebrate-pink);
                    color: white;
                    border: none;
                    padding: 12px 32px;
                    font-size: 1.1rem;
                    font-weight: bold;
                    border-radius: 50px;
                    cursor: pointer;
                    box-shadow: 0 4px 15px rgba(255, 139, 148, 0.4);
                    transition: all 0.2s ease;
                    display: inline-flex;
                    align-items: center;
                    gap: 8px;
                    animation: pop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.2s backwards;
                }

                .play-btn:hover {
                    transform: translateY(-3px) scale(1.05);
                    box-shadow: 0 6px 20px rgba(255, 139, 148, 0.6);
                    background-color: #ff7681;
                }

                .play-btn:active {
                    transform: translateY(-1px);
                }
        .countdown-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 1rem;
        }

        .time-box {
            background: #FFF9F9;
            padding: 12px 5px;
            border-radius: 16px;
            border: 2px dashed var(--accent-pink);
        }

        .number {
            font-size: 1.6rem;
            font-weight: bold;
            color: #FF8B94;
            display: block;
        }

        .label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 2px;
        }

        /* Cute Decorative Floating Elements */
        .sparkle {
            display: inline-block;
            animation: bounce 2s infinite ease-in-out;
            font-size: 1.5rem;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        /* Hidden Utility Class */
        .hidden {
            display: none !important;
        }

        #celebration-screen h1 {
            font-size: 2.2rem;
            animation: pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes pop {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Canvas overlay for particle/VFX animation */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }
    </style>
</head>
<body>

    <canvas id="canvasVFX"></canvas>

    <!-- Countdown Card -->
    <div class="container" id="countdown-card">
        <h1>Something Special is Loading... <span class="sparkle">🌸</span></h1>
        <p class="subtitle">Hold tightly! something unexpected is coming...</p>
        
        <div class="countdown-grid">
            <div class="time-box"><span class="number" id="days">00</span><span class="label">Days</span></div>
            <div class="time-box"><span class="number" id="hours">00</span><span class="label">Hrs</span></div>
            <div class="time-box"><span class="number" id="minutes">00</span><span class="label">Min</span></div>
            <div class="time-box"><span class="number" id="seconds">00</span><span class="label">Sec</span></div>
        </div>
    </div>

    <!-- Celebration Card (Swaps at 0) -->
    <div class="container hidden" id="celebration-screen">
        <div class="celebrate-heading">
            <span>✨</span>
            <h2>Happy Birthday!</h2>
            <span>✨</span>
        </div>
        <button class="play-btn" onclick="launchYourGame()">
            <span>🎮</span> Click to Play!
        </button>
    </div>

    <script>
        // --- TIMER CONFIGURATION ---
        // TESTING MODE: 10 seconds from right now
          const targetDate = new Date("May 26, 2026 00:00:00").getTime();

        const countdownCard = document.getElementById("countdown-card");
        const celebrationScreen = document.getElementById("celebration-screen");

        const updateCountdown = setInterval(() => {
            const now = new Date().getTime();
            const difference = targetDate - now;

            // Calculations for Time Boxes
            const days = Math.floor(difference / (1000 * 60 * 60 * 24));
            const hours = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((difference % (1000 * 60)) / 1000);

            // Display values
            document.getElementById("days").innerText = days < 10 ? "0" + days : days;
            document.getElementById("hours").innerText = hours < 10 ? "0" + hours : hours;
            document.getElementById("minutes").innerText = minutes < 10 ? "0" + minutes : minutes;
            document.getElementById("seconds").innerText = seconds < 10 ? "0" + seconds : seconds;

            // When countdown reaches 0
            if (difference <= 0) {
                clearInterval(updateCountdown);
                countdownCard.classList.add("hidden");
                celebrationScreen.classList.remove("hidden");
                startCuteVFX(); // Trigger animation
            }
        }, 1000);


        // --- ACTION WHEN "CLICK TO PLAY" IS TRIGGERED ---
        function launchYourGame() {
            // Hide the entire celebration card container
            celebrationScreen.classList.add("hidden");
            // Optional: Stop the background particle rain if you want it clean for the game
            // canvasVFX can be repurposed or cleared here.
            alert("🎮 Game initialization goes here! You can inject your canvas runner code now.");
        }


        // --- CUTENESS OVERLOAD VFX ANIMATION ENGINE ---
        function startCuteVFX() {
            const canvas = document.getElementById("canvasVFX");
            const ctx = canvas.getContext("2d");
            
            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);

            const particles = [];
            const pastelColors = ["#FFB7B2", "#FFDAC1", "#E2F0CB", "#BFFCC6", "#C7CEEA", "#FF9AA2"];

            class Particle {
                constructor() {
                    this.x = canvas.width / 2;
                    this.y = canvas.height / 2; 
                    this.size = Math.random() * 8 + 4; 
                    this.speedX = Math.random() * 10 - 5;
                    this.speedY = Math.random() * -12 - 3; 
                    this.gravity = 0.2;
                    this.color = pastelColors[Math.floor(Math.random() * pastelColors.length)];
                    this.opacity = 1;
                    this.fadeSpeed = Math.random() * 0.015 + 0.005;
                    this.shape = Math.random() > 0.5 ? 'circle' : 'heart'; 
                }

                update() {
                    this.speedY += this.gravity; 
                    this.x += this.speedX;
                    this.y += this.speedY;
                    this.opacity -= this.fadeSpeed;
                }

                draw() {
                    ctx.save();
                    ctx.globalAlpha = this.opacity;
                    ctx.fillStyle = this.color;
                    ctx.beginPath();

                    if (this.shape === 'circle') {
                        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                        ctx.fill();
                    } else {
                        // Drawing simple, cute blocky hearts
                        let d = this.size;
                        ctx.translate(this.x, this.y);
                        ctx.moveTo(0, d / 4);
                        ctx.quadraticCurveTo(0, 0, d / 2, 0);
                        ctx.quadraticCurveTo(d, 0, d, d / 3);
                        ctx.quadraticCurveTo(d, d * 2 / 3, d / 2, d);
                        ctx.quadraticCurveTo(0, d * 2 / 3, 0, d / 3);
                        ctx.fill();
                    }
                    ctx.restore();
                }
            }

            // Generate initial burst of 150 particles
            for (let i = 0; i < 150; i++) {
                particles.push(new Particle());
            }

            // Continuous gentle rain of particles after the initial burst
            const streamInterval = setInterval(() => {
                for(let i=0; i<3; i++) {
                    let p = new Particle();
                    p.x = Math.random() * canvas.width;
                    p.y = -10; 
                    p.speedY = Math.random() * 3 + 1; 
                    p.gravity = 0.02;
                    particles.push(p);
                }
            }, 100);

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                for (let i = particles.length - 1; i >= 0; i--) {
                    particles[i].update();
                    particles[i].draw();
                    if (particles[i].opacity <= 0) {
                        particles.splice(i, 1);
                    }
                }
                requestAnimationFrame(animate);
            }
            animate();
        }
    </script>
</body>
</html>
